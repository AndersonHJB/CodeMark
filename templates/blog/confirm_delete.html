{% extends "blog/base.html" %}

{% block title %}删除文章 - CodeMark 博客{% endblock %}

{% block content %}
<section class="blog-delete-panel">
    <h1>删除文章</h1>
    <p>确认删除《{{ post.title }}》？该操作无法撤销。</p>
    <form method="post">
        {% csrf_token %}
        <a class="blog-btn blog-btn-ghost" href="{{ post.get_absolute_url }}">取消</a>
        <button class="blog-btn blog-btn-danger" type="submit">确认删除</button>
    </form>
</section>
{% endblock %}
