<span class="account-vip-badge{% if codemark_account.membership_tier %} account-vip-badge-{{ codemark_account.membership_tier }}{% endif %}"
      data-account-vip-badge
      {% if codemark_account.membership_label %}aria-label="{{ codemark_account.membership_label }}" title="{{ codemark_account.membership_label }}"{% endif %}
      {% if not codemark_account.membership_label %}hidden{% endif %}>
    <span class="account-vip-badge-icon" aria-hidden="true">
        <svg class="account-vip-icon account-vip-icon-vip" viewBox="0 0 24 24" focusable="false">
            <path d="M4.5 8.4 9 11.6 12 5.5l3 6.1 4.5-3.2-1.2 9.1H5.7L4.5 8.4Z"></path>
            <path d="M6.2 20h11.6"></path>
        </svg>
        <svg class="account-vip-icon account-vip-icon-permanent-vip" viewBox="0 0 24 24" focusable="false">
            <path d="M12 3.5 20.5 9 12 20.5 3.5 9 12 3.5Z"></path>
            <path d="M7.4 9h9.2"></path>
            <path d="m9.2 9 2.8 11.5L14.8 9"></path>
        </svg>
        <svg class="account-vip-icon account-vip-icon-admin" viewBox="0 0 24 24" focusable="false">
            <path d="M12 3.3 19.5 6v5.8c0 4.7-3 7.6-7.5 8.9-4.5-1.3-7.5-4.2-7.5-8.9V6L12 3.3Z"></path>
            <path d="m8.9 12.1 2.1 2.1 4.4-4.7"></path>
        </svg>
    </span>
    <span class="account-vip-badge-label" data-account-vip-label>{{ codemark_account.membership_label }}</span>
</span>
