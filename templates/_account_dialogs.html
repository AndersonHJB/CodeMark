<script>
    window.CODEMARK_ACCOUNT_CONFIG = {
        sessionUrl: "{% url 'account_session' %}",
        randomProfileUrl: "{% url 'account_random_profile' %}",
        sendCodeUrl: "{% url 'account_send_code' %}",
        registerUrl: "{% url 'account_register' %}",
        loginUrl: "{% url 'account_login' %}",
        logoutUrl: "{% url 'account_logout' %}",
        profileUrl: "{% url 'account_profile' %}",
        csrfToken: "{{ csrf_token|escapejs }}",
        defaultAvatarUrl: "{{ codemark_account.default_avatar_url|escapejs }}"
    };
    window.CODEMARK_ACCOUNT_INITIAL = {
        isAuthenticated: {{ codemark_account.is_authenticated|yesno:"true,false" }},
        displayName: "{{ codemark_account.display_name|default_if_none:''|escapejs }}",
        email: "{{ codemark_account.email|default_if_none:''|escapejs }}",
        username: "{{ codemark_account.username|default_if_none:''|escapejs }}",
        bio: "{{ codemark_account.bio|default_if_none:''|escapejs }}",
        avatarUrl: "{{ codemark_account.avatar_url|escapejs }}"
    };
</script>

<div class="account-toast" hidden data-account-toast></div>

<div class="account-dialog-backdrop" hidden data-account-dialog>
    <div class="account-dialog" role="dialog" aria-modal="true" aria-labelledby="accountDialogTitle">
        <div class="account-dialog-header">
            <div>
                <h2 id="accountDialogTitle">CodeMark 账号</h2>
                <p data-account-dialog-subtitle>
                    {% if codemark_account.is_authenticated %}
                        管理头像、昵称和个人简介
                    {% else %}
                        登录或注册后可逐步解锁个人功能
                    {% endif %}
                </p>
            </div>
            <button class="account-dialog-close" type="button" aria-label="关闭" data-account-close>
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
        </div>

        <div class="account-tabs" role="tablist" aria-label="账号操作">
            <button class="account-tab{% if not codemark_account.is_authenticated %} is-active{% endif %}" type="button" data-account-tab="login"{% if codemark_account.is_authenticated %} hidden{% endif %}>登录</button>
            <button class="account-tab" type="button" data-account-tab="register"{% if codemark_account.is_authenticated %} hidden{% endif %}>注册</button>
            <button class="account-tab{% if codemark_account.is_authenticated %} is-active{% endif %}" type="button" data-account-tab="profile"{% if not codemark_account.is_authenticated %} hidden{% endif %}>资料</button>
        </div>

        <form class="account-panel{% if not codemark_account.is_authenticated %} is-active{% endif %}" data-account-panel="login" data-account-login-form{% if codemark_account.is_authenticated %} hidden{% endif %}>
            <label class="account-field">
                <span>邮箱或用户名</span>
                <input name="identifier" type="text" autocomplete="username" required>
            </label>
            <label class="account-field">
                <span>密码</span>
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="account-primary-btn" type="submit">登录</button>
            <p class="account-inline-hint">还没有账号？<button type="button" data-account-switch-register>创建账号</button></p>
        </form>

        <form class="account-panel" data-account-panel="register" data-account-register-form{% if codemark_account.is_authenticated %} hidden{% endif %}>
            <label class="account-field">
                <span>邮箱</span>
                <input name="email" type="email" autocomplete="email" required>
            </label>
            <div class="account-field">
                <div class="account-field-heading">
                    <label for="accountRegisterDisplayName">昵称</label>
                    <button class="account-mini-action" type="button" data-account-random-profile="display_name" title="随机昵称">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M16 3h5v5"></path>
                            <path d="M4 20 21 3"></path>
                            <path d="M21 16v5h-5"></path>
                            <path d="M15 15 21 21"></path>
                            <path d="M4 4l5 5"></path>
                        </svg>
                        <span>随机</span>
                    </button>
                </div>
                <input id="accountRegisterDisplayName" name="display_name" type="text" maxlength="40" autocomplete="nickname" placeholder="可选">
            </div>
            <div class="account-field">
                <div class="account-field-heading">
                    <label for="accountRegisterBio">个人简介</label>
                    <button class="account-mini-action" type="button" data-account-random-profile="bio" title="随机个人简介">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M16 3h5v5"></path>
                            <path d="M4 20 21 3"></path>
                            <path d="M21 16v5h-5"></path>
                            <path d="M15 15 21 21"></path>
                            <path d="M4 4l5 5"></path>
                        </svg>
                        <span>随机</span>
                    </button>
                </div>
                <textarea id="accountRegisterBio" name="bio" maxlength="160" rows="3" placeholder="可选"></textarea>
            </div>
            <label class="account-field">
                <span>密码</span>
                <input name="password" type="password" autocomplete="new-password" minlength="8" required>
            </label>
            <label class="account-field">
                <span>邮箱验证码</span>
                <span class="account-code-row">
                    <input name="code" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" required>
                    <button class="account-secondary-btn" type="button" data-account-send-code>发送验证码</button>
                </span>
            </label>
            <button class="account-primary-btn" type="submit">注册并登录</button>
            <p class="account-inline-hint">已经有账号？<button type="button" data-account-switch-login>去登录</button></p>
        </form>

        <form class="account-panel{% if codemark_account.is_authenticated %} is-active{% endif %}" data-account-panel="profile" data-account-profile-form enctype="multipart/form-data"{% if not codemark_account.is_authenticated %} hidden{% endif %}>
            <div class="account-profile-preview">
                <img src="{{ codemark_account.avatar_url }}" alt="当前头像" data-account-profile-avatar>
                <div>
                    <strong data-account-name>{{ codemark_account.display_name }}</strong>
                    <span data-account-subtitle>{{ codemark_account.email|default:"未登录" }}</span>
                </div>
            </div>
            <label class="account-field">
                <span>头像</span>
                <input name="avatar" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
            </label>
            <div class="account-avatar-actions">
                <button class="account-secondary-btn account-random-avatar-btn" type="button" data-account-use-random-default>
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M16 3h5v5"></path>
                        <path d="M4 20 21 3"></path>
                        <path d="M21 16v5h-5"></path>
                        <path d="M15 15 21 21"></path>
                        <path d="M4 4l5 5"></path>
                    </svg>
                    <span>使用随机默认头像</span>
                </button>
            </div>
            <div class="account-field">
                <div class="account-field-heading">
                    <label for="accountProfileDisplayName">昵称</label>
                    <button class="account-mini-action" type="button" data-account-random-profile="display_name" title="随机昵称">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M16 3h5v5"></path>
                            <path d="M4 20 21 3"></path>
                            <path d="M21 16v5h-5"></path>
                            <path d="M15 15 21 21"></path>
                            <path d="M4 4l5 5"></path>
                        </svg>
                        <span>随机</span>
                    </button>
                </div>
                <input id="accountProfileDisplayName" name="display_name" type="text" maxlength="40" value="{{ codemark_account.display_name }}">
            </div>
            <div class="account-field">
                <div class="account-field-heading">
                    <label for="accountProfileBio">个人简介</label>
                    <button class="account-mini-action" type="button" data-account-random-profile="bio" title="随机个人简介">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M16 3h5v5"></path>
                            <path d="M4 20 21 3"></path>
                            <path d="M21 16v5h-5"></path>
                            <path d="M15 15 21 21"></path>
                            <path d="M4 4l5 5"></path>
                        </svg>
                        <span>随机</span>
                    </button>
                </div>
                <textarea id="accountProfileBio" name="bio" maxlength="160" rows="3">{{ codemark_account.bio|default_if_none:'' }}</textarea>
            </div>
            <button class="account-primary-btn" type="submit">保存资料</button>
        </form>
    </div>
</div>
